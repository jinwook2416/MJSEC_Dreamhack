<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJSEC Dreamhack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .hero-section { height: 70vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .btn-custom { padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; transition: 0.3s; }
        .btn-reg { border: 2px solid #007bff; color: #007bff; background: transparent; }
        .btn-reg:hover { background: #007bff; color: white; }
        .btn-solve { border: 2px solid #28a745; color: #28a745; background: transparent; }
        .btn-solve:hover { background: #28a745; color: white; }
        .user-info { color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand" href="/">MJSEC Dreamhack</a>
            <div class="d-flex align-items-center">
                {% if user %}
                    <span class="user-info me-3">환영합니다, <strong>{{ user.username }}</strong>님</span>
                    <small class="text-info">
                        {% if user.permission == 'admin' %}
                            관리자 권한     
                        {% else %}
                            일반 사용자 권한    
                        {% endif %}
                    </small>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">로그아웃</a>
                {% else %}
                    <a href="/login" class="btn btn-sm btn-outline-primary me-2">로그인</a>
                    <a href="/signup" class="btn btn-sm btn-outline-secondary">회원가입</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero-section text-center">
            <h1 class="display-3 fw-bold mb-4">Challenge Your Skill</h1>
            <p class="lead mb-5 text-secondary">보안 취약점을 탐색하고 플래그를 획득하세요.</p>
            
            <div class="d-grid gap-4 d-md-block">
                <a href="/register" class="btn btn-custom btn-reg me-md-4">문제 등록하기</a>
                <a href="/list" class="btn btn-custom btn-solve">문제 풀러가기</a>
            </div>
        </div>
    </div>

    <footer class="text-center text-secondary py-4 mt-auto">
        <small>&copy; MJSEC Dreamhack Lab. For Educational Purposes Only.</small>
    </footer>

</body>
</html>
