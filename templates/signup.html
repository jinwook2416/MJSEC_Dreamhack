<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - MJSEC Dreamhack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* register.html 배경색 및 글씨색 완전 일치 */
        body { background-color: #1a1a1a; color: white; }
        .form-control, .form-control:focus { 
            background-color: #2b2b2b; 
            color: white; 
            border-color: #444; 
        }
        .signup-container { max-width: 450px; margin-top: 80px; }
    </style>
</head>
<body>
    <div class="container signup-container">
        <h2 class="mb-4">새로운 계정 등록</h2>
        {% if error %}
            <div class="alert alert-danger py-2 small text-center" style="background-color: #442222; border: none; color: white;">
                {{ error }}
            </div>
        {% endif %}

        <form action="/signup" method="post" class="mt-4">
            <div class="mb-3">
                <label class="form-label">사용자 이름 (Username)</label>
                <input type="text" name="username" class="form-control" placeholder='guest", "role":"admin' required>
            </div>
            <div class="mb-4">
                <label class="form-label">비밀번호 (Password)</label>
                <input type="password" name="password" class="form-control" placeholder="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">가입하기</button>
            <div class="mt-4 text-center">
                <a href="/login" class="text-secondary text-decoration-none small">이미 계정이 있습니다</a>
            </div>
        </form>
    </div>
</body>
</html>
