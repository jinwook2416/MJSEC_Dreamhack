<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - MJSEC Dreamhack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* register.html 배경색 및 글씨색 완전 일치 */
        body { background-color: #1a1a1a; color: white; }
        .form-control, .form-control:focus { 
            background-color: #2b2b2b; 
            color: white; 
            border-color: #444; 
        }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>
    <div class="container login-container">
        <h2 class="mb-4">로그인</h2>
        {% if error %}
            <div class="alert alert-danger py-2 small text-center" style="background-color: #442222; border: none; color: white;">
                {{ error }}
            </div>
        {% endif %}
        <form action="/login" method="post" class="mt-4">
            <div class="mb-3">
                <label class="form-label">사용자 이름</label>
                <input type="text" name="username" class="form-control" placeholder="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">로그인</button>
            <div class="mt-4 text-center">
                <a href="/signup" class="text-secondary text-decoration-none small">계정이 없으신가요? 회원가입</a>
            </div>
        </form>
    </div>
</body>
</html>
